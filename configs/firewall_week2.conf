############################################################
# firewall.conf  (Week 2 - Enhanced Security Pipeline)
#
# VM: ElasticStackServer (192.168.100.30)
#
# What changed from Week 1:
#   - Added UFW firewall parsing (extracts IPs, ports, action)
#   - Added SSH auth parsing (success/failure/invalid user)
#   - Added event_category field (firewall/authentication/system)
#   - Added severity field (LOW/MEDIUM/HIGH)
#   - Added event_outcome field (success/failure/denied/allowed)
#   - Added UTC timestamp normalisation
#   - Added port type conversion (string to integer)
#
# Input:  Filebeat agents on port 5044
# Output: Elasticsearch HTTPS with keystore credentials
# Index:  logstash-firewall-YYYY.MM.dd
############################################################

input {
  beats {
    port => 5044
  }
}

filter {

  # ── STEP 1: Preserve original message for forensics ──
  # Never modify the original log line. Store a copy first.
  mutate {
    add_field => { "event_original" => "%{message}" }
  }

  # ── STEP 2: Parse standard syslog header ──
  # Syslog format: MMM dd HH:mm:ss hostname process[pid]: message
  # Example: Mar 12 14:30:01 gateway sshd[1234]: Failed password
  grok {
    match => {
      "message" => [
        "%{SYSLOGTIMESTAMP:syslog_timestamp} %{HOSTNAME:host_name} %{DATA:process_name}(?:\[%{POSINT:process_pid}\])?: %{GREEDYDATA:log_message}",
        "%{GREEDYDATA:log_message}"
      ]
    }
    tag_on_failure => ["_grok_syslog_failure"]
  }

  # ── STEP 3: Parse UFW Firewall Events ──
  # Matches lines like: [UFW BLOCK] IN=eth0 OUT= SRC=10.0.0.1 DST=192.168.100.1 ...
  # Extracts: action (BLOCK/ALLOW), source IP, dest IP, protocol, ports
  if "UFW" in [log_message] {
    grok {
      match => {
        "log_message" => [
          "\[UFW %{WORD:ufw_action}\] IN=%{DATA:ufw_interface_in} OUT=%{DATA:ufw_interface_out}.*SRC=%{IP:source_ip}.*DST=%{IP:destination_ip}.*PROTO=%{WORD:network_protocol}(?:.*SPT=%{INT:source_port})?(?:.*DPT=%{INT:destination_port})?",
          "\[UFW %{WORD:ufw_action}\]%{GREEDYDATA}"
        ]
      }
      tag_on_failure => ["_grok_ufw_failure"]
      add_tag => ["firewall_event"]
    }
    mutate {
      add_field => { "event_category" => "firewall" }
    }
    if [ufw_action] == "BLOCK" {
      mutate {
        add_field => { "event_outcome" => "denied" }
      }
      mutate {
        add_field => { "severity" => "MEDIUM" }
      }
      mutate {
        add_tag => ["security_relevant"]
      }
    } else if [ufw_action] == "ALLOW" {
      mutate {
        add_field => { "event_outcome" => "allowed" }
      }
      mutate {
        add_field => { "severity" => "LOW" }
      }
    }
  }

  # ── STEP 4: Parse SSH Authentication Events ──
  # Matches: Accepted password for student from 192.168.100.40 port 52341
  # Matches: Failed password for root from 10.0.0.5 port 44123
  # Matches: Invalid user hacker from 10.0.0.5 port 33222
  else if "sshd" in [process_name] {
    grok {
      match => {
        "log_message" => [
          "Accepted %{WORD:auth_method} for %{USERNAME:auth_user} from %{IP:source_ip} port %{INT:source_port}",
          "Failed %{WORD:auth_method} for (?:invalid user )?%{USERNAME:auth_user} from %{IP:source_ip} port %{INT:source_port}",
          "Invalid user %{USERNAME:auth_user} from %{IP:source_ip} port %{INT:source_port}",
          "Connection closed by.*%{IP:source_ip} port %{INT:source_port}",
          "Disconnected from.*%{IP:source_ip} port %{INT:source_port}"
        ]
      }
      tag_on_failure => ["_grok_ssh_failure"]
      add_tag => ["ssh_event"]
    }
    mutate {
      add_field => { "event_category" => "authentication" }
    }
    if "Failed" in [log_message] or "Invalid user" in [log_message] {
      mutate {
        add_field => { "event_outcome" => "failure" }
      }
      mutate {
        add_field => { "severity" => "HIGH" }
      }
      mutate {
        add_tag => ["security_alert", "brute_force_candidate"]
      }
    } else if "Accepted" in [log_message] {
      mutate {
        add_field => { "event_outcome" => "success" }
      }
      mutate {
        add_field => { "severity" => "LOW" }
      }
    } else {
      mutate {
        add_field => { "event_outcome" => "info" }
      }
      mutate {
        add_field => { "severity" => "LOW" }
      }
    }
  }

  # ── STEP 5: Default category for anything not UFW or SSH ──
  if ![event_category] {
    mutate {
      add_field => { "event_category" => "system" }
    }
    mutate {
      add_field => { "severity" => "LOW" }
    }
  }

  # ── STEP 6: Normalise syslog timestamp to UTC ──
  if [syslog_timestamp] {
    date {
      match => [ "syslog_timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss" ]
      target => "@timestamp"
      timezone => "UTC"
    }
  }

  # ── STEP 7: Convert port strings to integers ──
  # Kibana needs integers for port range filters and aggregations
  if [source_port] {
    mutate { convert => { "source_port" => "integer" } }
  }
  if [destination_port] {
    mutate { convert => { "destination_port" => "integer" } }
  }
}

output {
  elasticsearch {
    hosts  => ["https://localhost:9200"]
    user   => "logstash_internal"
    password => "${ES_PWD}"
    ssl    => true
    cacert => "/etc/logstash/certs/http_ca.crt"
    index  => "logstash-firewall-%{+YYYY.MM.dd}"
  }

  # Debug output - shows events in Logstash journal logs
  # Remove this line in production
  stdout { codec => rubydebug }
}
