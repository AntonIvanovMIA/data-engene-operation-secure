############################################################
# Catnip Games International - Logstash Pipeline
# File: /etc/logstash/conf.d/firewall.conf
# VM: ElasticStackServer (192.168.100.30)
# Version: Week 3-4 (IDS support added)
#
# This pipeline processes logs from 3 security sources:
#   1. UFW Firewall logs (BLOCK/ALLOW decisions)
#   2. SSH Authentication logs (login success/failure)
#   3. IDS/Snort alerts (intrusion detection)
#
# Data flow:
#   Filebeat (Gateway/Webserver) --> port 5044 --> this pipeline
#   --> Elasticsearch (HTTPS 9200) --> Kibana (5601)
#
# Credentials: ES_PWD loaded from Logstash keystore
# TLS: CA certificate at /etc/logstash/certs/http_ca.crt
############################################################


############################################################
# INPUT SECTION
# Defines WHERE logs come FROM
# Filebeat agents on Gateway (192.168.100.1) and
# Webserver (192.168.100.10) connect to this port
############################################################
input {
  # The Beats input plugin listens for incoming connections
  # from Filebeat agents running on other VMs
  beats {
    # Port 5044 is the standard Beats protocol port
    # Both Gateway and Webserver Filebeat agents send here
    port => 5044
  }
}


############################################################
# FILTER SECTION
# Defines HOW logs are PROCESSED
# Each log line passes through these filters in order
# The filters extract structured fields from raw text
############################################################
filter {

  #  FIRST: Detect IDS logs
  if "[**]" in [message] {

    mutate {
      replace => {
        "log_type" => "ids"
        "event_category" => "intrusion_detection"
      }
    }

  } else {

    # NORMAL SYSTEM LOGS
    mutate {
      replace => {
        "log_type" => "system"
        "event_category" => "system"
      }
    }

  }
}


  ##########################################################
  # STEP 1: Preserve original message
  #
  # Before any parsing changes the message field, save a
  # copy of the raw unmodified log line. This is critical
  # for forensic investigations where you need the exact
  # original text as evidence in court or incident reports.
  ##########################################################
  mutate {
    # Copy the entire message into a new field called
    # event_original. The %{message} syntax means
    # "the current value of the message field"
    add_field => { "event_original" => "%{message}" }
  }


  ##########################################################
  # STEP 2: Parse standard syslog header
  #
  # Most Linux logs follow the syslog format:
  #   MMM dd HH:mm:ss hostname process[pid]: message
  # Example:
  #   Mar 12 14:30:01 gateway sshd[1234]: Failed password
  #
  # This grok pattern extracts:
  #   syslog_timestamp = "Mar 12 14:30:01"
  #   host_name = "gateway"
  #   process_name = "sshd"
  #   process_pid = "1234"
  #   log_message = "Failed password for root from 10.0.0.5"
  #
  # Two patterns are tried in order:
  #   First: full syslog format with all fields
  #   Second: fallback that captures everything as log_message
  ##########################################################
  grok {
    match => {
      # Try to match the message field against these patterns
      "message" => [
        # Pattern 1: Full syslog format
        # %{SYSLOGTIMESTAMP} matches "Mar 12 14:30:01"
        # %{HOSTNAME} matches "gateway"
        # %{DATA} matches "sshd" (the process name)
        # (?:\[%{POSINT}\])? optionally matches "[1234]" (PID)
        # %{GREEDYDATA} matches everything remaining
        "%{SYSLOGTIMESTAMP:syslog_timestamp} %{HOSTNAME:host_name} %{DATA:process_name}(?:\[%{POSINT:process_pid}\])?: %{GREEDYDATA:log_message}",
        # Pattern 2: Fallback - if syslog format doesn't match,
        # just capture the entire line as log_message
        "%{GREEDYDATA:log_message}"
      ]
    }
    # If NEITHER pattern matches, add this failure tag
    # so we can find unparsed events in Kibana
    tag_on_failure => ["_grok_syslog_failure"]
  }


  ##########################################################
  # STEP 3: Parse UFW Firewall Events
  #
  # UFW (Uncomplicated Firewall) logs look like:
  #   [UFW BLOCK] IN=eth0 OUT= SRC=10.0.0.5 DST=192.168.100.1
  #   LEN=40 TOS=0x00 PROTO=TCP SPT=54321 DPT=22
  #
  # This section ONLY runs if "UFW" appears in log_message
  # It extracts:
  #   ufw_action = "BLOCK" or "ALLOW"
  #   source_ip = attacker's IP address
  #   destination_ip = target's IP address
  #   network_protocol = "TCP" or "UDP"
  #   source_port = attacker's port number
  #   destination_port = target's port number (e.g. 22 for SSH)
  #
  # Blocked connections get MEDIUM severity because they
  # could indicate a port scan or attack attempt
  ##########################################################
  if "UFW" in [log_message] {
    grok {
      match => {
        "log_message" => [
          # Full UFW pattern extracting all network metadata
          # \[UFW matches the literal text "[UFW"
          # %{WORD:ufw_action} captures "BLOCK" or "ALLOW"
          # %{IP:source_ip} captures the source IP address
          # %{IP:destination_ip} captures the destination IP
          # %{WORD:network_protocol} captures "TCP" or "UDP"
          # (?:.*SPT=%{INT})? optionally captures source port
          # (?:.*DPT=%{INT})? optionally captures dest port
          "\[UFW %{WORD:ufw_action}\] IN=%{DATA:ufw_interface_in} OUT=%{DATA:ufw_interface_out}.*SRC=%{IP:source_ip}.*DST=%{IP:destination_ip}.*PROTO=%{WORD:network_protocol}(?:.*SPT=%{INT:source_port})?(?:.*DPT=%{INT:destination_port})?",
          # Fallback: at least capture the UFW action
          "\[UFW %{WORD:ufw_action}\]%{GREEDYDATA}"
        ]
      }
      tag_on_failure => ["_grok_ufw_failure"]
      # Tag this event so we can filter for firewall events in Kibana
      add_tag => ["firewall_event"]
    }
    # Set the event category to "firewall" for dashboard filtering
    mutate { add_field => { "event_category" => "firewall" } }
    # BLOCKED connections are potentially malicious
    if [ufw_action] == "BLOCK" {
      # "denied" means the firewall rejected this connection
      mutate { add_field => { "event_outcome" => "denied" } }
      # MEDIUM severity: could be a scan or attack attempt
      mutate { add_field => { "severity" => "MEDIUM" } }
    # ALLOWED connections are normal traffic
    } else if [ufw_action] == "ALLOW" {
      mutate { add_field => { "event_outcome" => "allowed" } }
      # LOW severity: normal permitted traffic
      mutate { add_field => { "severity" => "LOW" } }
    }
  }


  ##########################################################
  # STEP 4: Parse SSH Authentication Events
  #
  # SSH daemon (sshd) logs authentication attempts:
  #   Accepted password for student from 192.168.100.40 port 52341
  #   Failed password for root from 10.0.0.5 port 44123
  #   Invalid user hacker from 10.0.0.5 port 33222
  #
  # This section ONLY runs if process_name contains "sshd"
  # AND the event was NOT already matched by UFW (else if)
  #
  # It extracts:
  #   auth_method = "password" or "publickey"
  #   auth_user = the username that was tried
  #   source_ip = IP address of the person/bot trying to login
  #   source_port = their port number
  #
  # Failed logins get HIGH severity because they could
  # indicate a brute-force attack
  ##########################################################
  else if "sshd" in [process_name] {
    grok {
      match => {
        "log_message" => [
          # Pattern 1: Successful login
          # "Accepted password for student from 192.168.100.40 port 52341"
          "Accepted %{WORD:auth_method} for %{USERNAME:auth_user} from %{IP:source_ip} port %{INT:source_port}",
          # Pattern 2: Failed login (with optional "invalid user" prefix)
          # "Failed password for root from 10.0.0.5 port 44123"
          # "Failed password for invalid user admin from 10.0.0.5 port 44123"
          "Failed %{WORD:auth_method} for (?:invalid user )?%{USERNAME:auth_user} from %{IP:source_ip} port %{INT:source_port}",
          # Pattern 3: Invalid user (user does not exist on system)
          # "Invalid user hacker from 10.0.0.5 port 33222"
          "Invalid user %{USERNAME:auth_user} from %{IP:source_ip} port %{INT:source_port}",
          # Pattern 4: Connection closed (someone connected but didn't login)
          "Connection closed by.*%{IP:source_ip} port %{INT:source_port}",
          # Pattern 5: Disconnected
          "Disconnected from.*%{IP:source_ip} port %{INT:source_port}"
        ]
      }
      tag_on_failure => ["_grok_ssh_failure"]
      # Tag for Kibana filtering
      add_tag => ["ssh_event"]
    }
    # Category for dashboard grouping
    mutate { add_field => { "event_category" => "authentication" } }
    # Check if login FAILED (potential brute-force attack)
    if "Failed" in [log_message] or "Invalid user" in [log_message] {
      # Mark as failure for success/failure pie charts
      mutate { add_field => { "event_outcome" => "failure" } }
      # HIGH severity: failed logins may indicate an attack
      mutate { add_field => { "severity" => "HIGH" } }
    # Check if login SUCCEEDED (normal access)
    } else if "Accepted" in [log_message] {
      mutate { add_field => { "event_outcome" => "success" } }
      # LOW severity: successful login is normal
      mutate { add_field => { "severity" => "LOW" } }
    # Anything else SSH-related (disconnect, close, etc.)
    } else {
      mutate { add_field => { "event_outcome" => "info" } }
      mutate { add_field => { "severity" => "LOW" } }
    }
  }


  ##########################################################
  # STEP 4b: Parse IDS/Snort Alerts (Added Week 3-4)
  #
  # Snort IDS alerts have this format (3 lines per alert):
  #   [**] [1:100001:3] ET SCAN Potential SSH Scan [**]
  #   [Classification: attempted-recon] [Priority: 2]
  #   04/01/2026-14:30:01.123456 10.1.2.3:54321 -> 192.168.100.1:22 TCP
  #
  # Filebeat sends each line separately, so we detect IDS
  # events by checking if "Classification:" appears in the
  # message. This keyword only appears in Snort alert lines.
  #
  # This section extracts:
  #   ids_sid = signature ID (e.g. "1:100001:3")
  #   ids_signature = alert name (e.g. "ET SCAN Potential SSH Scan")
  #   ids_classification = attack type (e.g. "attempted-recon")
  #   ids_priority = severity 1-4 (1=critical, 4=low)
  #   source_ip = attacker's IP address
  #   destination_ip = target's IP address
  #   source_port = attacker's port
  #   destination_port = target's port
  #   network_protocol = TCP or UDP
  #
  # Priority 1 alerts get CRITICAL severity
  # Priority 2 alerts get HIGH severity
  # Priority 3+ alerts get MEDIUM severity
  ##########################################################
  else if "Classification:" in [message] {
    grok {
      match => {
        # Try to match against the raw message (not log_message)
        # because IDS alerts don't follow syslog format
        "message" => [
          # Full pattern: extracts ALL Snort alert fields
          # \[\*\*\] matches the literal text "[**]"
          # %{DATA:ids_sid} captures "1:100001:3"
          # %{DATA:ids_signature} captures "ET SCAN Potential SSH Scan"
          # %{DATA:ids_classification} captures "attempted-recon"
          # %{INT:ids_priority} captures "2"
          # %{IP:source_ip}:%{INT:source_port} captures attacker
          # -> separates source from destination
          # %{IP:destination_ip}:%{INT:destination_port} captures target
          # %{WORD:network_protocol} captures "TCP" or "UDP"
          "\[\*\*\] \[%{DATA:ids_sid}\] %{DATA:ids_signature} \[\*\*\].*\[Classification: %{DATA:ids_classification}\] \[Priority: %{INT:ids_priority}\].*%{IP:source_ip}:%{INT:source_port} -> %{IP:destination_ip}:%{INT:destination_port} %{WORD:network_protocol}",
          # Fallback pattern: captures at minimum the signature
          # Used when the network metadata line is separate
          "\[\*\*\] \[%{DATA:ids_sid}\] %{DATA:ids_signature} \[\*\*\]"
        ]
      }
      # Tag failures so we can debug in Kibana
      tag_on_failure => ["_grok_ids_failure"]
      # Tag for IDS-specific Kibana dashboards
      add_tag => ["ids_alert"]
    }
    # Set category for dashboard filtering and grouping
    mutate { add_field => { "event_category" => "intrusion_detection" } }
    # Map Snort priority numbers to severity labels
    # Priority 1 = most critical (exploits, trojans, root access)
    if [ids_priority] == "1" {
      mutate { add_field => { "severity" => "CRITICAL" } }
      mutate { add_field => { "event_outcome" => "alert" } }
    }
    # Priority 2 = high (scans, DoS attempts)
    else if [ids_priority] == "2" {
      mutate { add_field => { "severity" => "HIGH" } }
      mutate { add_field => { "event_outcome" => "alert" } }
    }
    # Priority 3+ = medium (policy violations, info)
    else {
      mutate { add_field => { "severity" => "MEDIUM" } }
      mutate { add_field => { "event_outcome" => "alert" } }
    }
  }


  ##########################################################
  # STEP 5: Default category
  #
  # Any event that was NOT matched by UFW, SSH, or IDS
  # parsing above will not have an event_category set.
  # We assign "system" as the default category and LOW
  # severity. These are normal system events like cron
  # jobs, service starts/stops, package manager activity.
  #
  # The condition ![event_category] means "if event_category
  # field does NOT exist"
  ##########################################################
  if ![event_category] {
    # Default category for unclassified events
    mutate { add_field => { "event_category" => "system" } }
    # LOW severity: normal system operations
    mutate { add_field => { "severity" => "LOW" } }
  }


  ##########################################################
  # STEP 6: Normalise syslog timestamp to UTC
  #
  # Syslog timestamps look like "Mar 12 14:30:01" which
  # does not include the year or timezone. Elasticsearch
  # needs ISO 8601 format (2026-03-12T14:30:01.000Z).
  #
  # The date filter converts the syslog_timestamp field
  # into the standard @timestamp field that Kibana uses
  # for time-based queries and visualisations.
  #
  # The coursework requires UTC timestamp standardisation.
  ##########################################################
  if [syslog_timestamp] {
    date {
      # Try two syslog date formats:
      # "MMM  d" = single-digit day with two spaces (Mar  4)
      # "MMM dd" = double-digit day with one space (Mar 12)
      match => [ "syslog_timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss" ]
      # Write the parsed date into @timestamp
      target => "@timestamp"
      # Assume UTC timezone since syslog doesn't specify
      timezone => "UTC"
    }
  }


  ##########################################################
  # STEP 7: Convert port strings to integers
  #
  # Grok extracts everything as strings by default.
  # Kibana and Elasticsearch need ports as integers for:
  #   - Range queries (e.g. "show ports > 1024")
  #   - Aggregations (e.g. "top 10 destination ports")
  #   - Proper sorting (22 before 443, not "22" after "443")
  #
  # We only convert if the field exists (to avoid errors
  # on events that don't have port information)
  ##########################################################
  if [source_port] {
    # Convert source_port from string "54321" to integer 54321
    mutate { convert => { "source_port" => "integer" } }
  }
  if [destination_port] {
    # Convert destination_port from string "22" to integer 22
    mutate { convert => { "destination_port" => "integer" } }
  }
}


############################################################
# OUTPUT SECTION
# Defines WHERE processed logs GO
# Events are sent to Elasticsearch over HTTPS and also
# printed to Logstash's log file for debugging
############################################################
output {
  # Send all processed events to Elasticsearch
  elasticsearch {
    # Connect to local Elasticsearch over HTTPS (encrypted)
    hosts  => ["https://localhost:9200"]
    # Use dedicated logstash_internal user (not elastic superuser)
    # This follows the principle of least privilege
    user   => "logstash_internal"
    # Password loaded from Logstash keystore at runtime
    # The actual password is NOT stored in this file
    # It was added with: logstash-keystore add ES_PWD
    password => "${ES_PWD}"
    # Enable SSL/TLS for encrypted communication
    ssl    => true
    # Trust the Elasticsearch CA certificate
    # This file was copied from /etc/elasticsearch/certs/
    cacert => "/etc/logstash/certs/http_ca.crt"
    # Index naming pattern with daily rotation
    # Creates indices like: logstash-firewall-2026.04.02
    # Daily indices allow easy management and retention
    index  => "logstash-firewall-%{+YYYY.MM.dd}"
  }
  # Debug output: prints events to Logstash journal/log
  # Useful during development to see what events look like
  # Remove this line in production to save disk space
  stdout { codec => rubydebug }
}
