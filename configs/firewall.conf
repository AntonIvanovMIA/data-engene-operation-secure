############################################################
# firewall.conf  (SECURE LAB PIPELINE)
#
# Purpose:
# - Receive logs over Beats input (Filebeat from other VMs)
# - Parse syslog-like firewall lines (grok)
# - Send to Elasticsearch over HTTPS using CA trust
# - Password comes from Logstash keystore (no plaintext)
#
# Notes:
# - This pipeline expects Filebeat → Logstash (5044)
# - Output index: logstash-firewall-YYYY.MM.dd
############################################################

input {
  beats {
    port => 5044                         # Filebeat ships to this port
  }
}

filter {
  mutate {
    add_tag => ["firewall"]              # Tag to identify events in Kibana
  }

  # Keep a copy of original message (good for troubleshooting)
  mutate {
    add_field => { "event.original" => "%{message}" }
  }

  # Attempt syslog parsing (timestamp host program[pid]: message)
  grok {
    match => {
      "message" => [
        "%{SYSLOGTIMESTAMP:syslog_timestamp} %{HOSTNAME:syslog_host} %{DATA:program}(?:\[%{POSINT:pid}\])?: %{GREEDYDATA:syslog_message}",
        "%{GREEDYDATA:syslog_message}"
      ]
    }
  }

  # Replace message with parsed syslog_message if present
  if [syslog_message] {
    mutate {
      replace => { "message" => "%{syslog_message}" }
    }
  }
}

output {
  elasticsearch {
    hosts  => ["https://localhost:9200"]         # Secure ES endpoint
    user   => "logstash_internal"                # Recommended least privilege user
    password => "${ES_PWD}"                      # Read from Logstash keystore

    ssl    => true
    cacert => "/etc/logstash/certs/http_ca.crt"  # Trust Elasticsearch CA

    index => "logstash-firewall-%{+YYYY.MM.dd}"
  }

  # Debug output useful for lab validation (remove later if needed)
  stdout { codec => rubydebug }
}
